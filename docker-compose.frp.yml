services:
  frps:
    image: snowdreamtech/frps:latest
    container_name: frp-server
    restart: unless-stopped
    ports:
      - "7000:7000"
      - "7500:7500"
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/frp/frps.toml:/etc/frp/frps.toml:ro

  frpc:
    image: snowdreamtech/frpc:latest
    container_name: frp-client
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./configs/frp/frpc.toml:/etc/frp/frpc.toml:ro
    profiles:
      - client
